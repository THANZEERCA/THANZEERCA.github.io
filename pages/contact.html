              <a href="mailto:thanzeer@example.com">thanzeer@example.com</a>

            <div>

              <p>Kochi, Kerala, India</p>

          </div>

      <!-- Form -->
      <form class="contact-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required />
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="Project inquiry" required />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Tell me about your project..."
            required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Send Message →</button>
      </form>
    </div>
